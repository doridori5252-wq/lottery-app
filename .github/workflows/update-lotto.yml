name: Update Korean Lotto Data

on:
  schedule:
    # Every Saturday at 21:30 KST (12:30 UTC) - after 20:45 KST draw
    - cron: '30 12 * * 6'
    # Retry 5 hours later if first attempt failed
    - cron: '30 17 * * 6'
  workflow_dispatch: # Manual trigger via GitHub Actions tab

jobs:
  update-lotto:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest Korean Lotto results (via lottolyzer.com)
        run: node scripts/fetch-lotto.js

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet js/app.js js/lotto-history.js sw.js || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/app.js js/lotto-history.js sw.js
          git commit -m "auto: Korean Lotto update $(date +%Y-%m-%d) via lottolyzer"
          git push
